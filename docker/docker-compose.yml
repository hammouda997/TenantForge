services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tenantforge
      POSTGRES_PASSWORD: tenantforge
      POSTGRES_DB: tenantforge
    ports:
      - '5435:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tenantforge']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6381:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    ports:
      - '4000:4000'
    environment:
      DATABASE_URL: postgresql://tenantforge:tenantforge@postgres:5432/tenantforge?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: dev-access-secret-change-in-production-min-32
      JWT_REFRESH_SECRET: dev-refresh-secret-change-in-production-min-32
      CORS_ORIGIN: http://localhost:3000
      PORT: 4000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
      NEXT_PUBLIC_WS_URL: http://localhost:4000
    depends_on:
      - api

volumes:
  postgres_data:
